<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파일 목록</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #59636e;
    --border: #d1d9e0;
    --hover: #f6f8fa;
    --accent: #0969da;
    --accent-bg: #ddf4ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #9198a1;
      --border: #30363d;
      --hover: #161b22;
      --accent: #4493f8;
      --accent-bg: #121d2f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
                 Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  .wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
  }
  .sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  #search {
    flex: 1;
    min-width: 200px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--fg);
    font-size: 0.95rem;
  }
  #search:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .breadcrumb {
    font-size: 0.9rem;
    margin-bottom: 12px;
    color: var(--muted);
    word-break: break-all;
  }
  .breadcrumb a {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }
  .breadcrumb a:hover { text-decoration: underline; }
  ul.list {
    list-style: none;
    margin: 0;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  ul.list li {
    border-top: 1px solid var(--border);
  }
  ul.list li:first-child { border-top: none; }
  ul.list a, ul.list .folder {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    text-decoration: none;
    color: var(--fg);
    cursor: pointer;
  }
  ul.list a:hover, ul.list .folder:hover { background: var(--hover); }
  .icon { width: 18px; text-align: center; flex: 0 0 auto; }
  .name { flex: 1; word-break: break-all; }
  .meta { color: var(--muted); font-size: 0.8rem; flex: 0 0 auto; }
  .state {
    padding: 40px 16px;
    text-align: center;
    color: var(--muted);
  }
  .error { color: #cf222e; }
  footer {
    margin-top: 24px;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>📁 파일 목록</h1>
  <div class="sub">이 폴더의 파일을 자동으로 불러옵니다.</div>

  <div class="toolbar">
    <input id="search" type="text" placeholder="파일 이름 검색…" autocomplete="off">
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>
  <ul class="list" id="list"></ul>
  <div class="state" id="state">불러오는 중…</div>

  <footer>
    <span id="count"></span>
  </footer>
</div>

<script>
(function () {
  "use strict";

  // ===== 설정 =====
  // 저장소 소유자와 이름. 필요하면 여기만 바꾸세요.
  var OWNER  = "jaewoojoung";
  var REPO   = "markdown";
  var BRANCH = "main"; // 기본 브랜치 (master를 쓰면 "master"로 변경)

  // 목록에서 숨길 파일들
  var HIDE = ["index.html", ".nojekyll"];

  var listEl   = document.getElementById("list");
  var stateEl  = document.getElementById("state");
  var crumbEl  = document.getElementById("breadcrumb");
  var countEl  = document.getElementById("count");
  var searchEl = document.getElementById("search");

  var currentItems = [];

  // 현재 경로는 URL 해시(#path)로 관리 → 새로고침/뒤로가기 가능
  function currentPath() {
    var h = decodeURIComponent(location.hash.replace(/^#\/?/, ""));
    return h.replace(/^\/+|\/+$/g, "");
  }

  function apiUrl(path) {
    var p = path ? "/" + encodeURI(path) : "";
    return "https://api.github.com/repos/" + OWNER + "/" + REPO +
           "/contents" + p + "?ref=" + BRANCH;
  }

  function iconFor(item) {
    if (item.type === "dir") return "📂";
    var ext = (item.name.split(".").pop() || "").toLowerCase();
    var map = {
      md: "📝", markdown: "📝", txt: "📄",
      html: "🌐", htm: "🌐",
      pdf: "📕",
      png: "🖼️", jpg: "🖼️", jpeg: "🖼️", gif: "🖼️", svg: "🖼️", webp: "🖼️",
      js: "📜", css: "🎨", json: "🔧", csv: "📊", xlsx: "📊",
      zip: "🗜️"
    };
    return map[ext] || "📄";
  }

  function humanSize(bytes) {
    if (!bytes && bytes !== 0) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1024 / 1024).toFixed(1) + " MB";
  }

  function renderBreadcrumb(path) {
    var parts = path ? path.split("/") : [];
    var html = '<a data-path="">🏠 홈</a>';
    var acc = "";
    parts.forEach(function (part) {
      acc = acc ? acc + "/" + part : part;
      html += ' / <a data-path="' + acc.replace(/"/g, "&quot;") + '">' +
              escapeHtml(part) + "</a>";
    });
    crumbEl.innerHTML = html;
    Array.prototype.forEach.call(crumbEl.querySelectorAll("a"), function (a) {
      a.addEventListener("click", function () {
        location.hash = "#/" + this.getAttribute("data-path");
      });
    });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;",
               '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function render(filter) {
    filter = (filter || "").toLowerCase();
    listEl.innerHTML = "";

    var shown = currentItems.filter(function (item) {
      if (HIDE.indexOf(item.name) !== -1) return false;
      return item.name.toLowerCase().indexOf(filter) !== -1;
    });

    // 폴더 먼저, 그 다음 파일 — 각각 이름순
    shown.sort(function (a, b) {
      if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
      return a.name.localeCompare(b.name, "ko");
    });

    if (shown.length === 0) {
      stateEl.textContent = filter ? "검색 결과가 없습니다." : "이 폴더는 비어 있습니다.";
      stateEl.className = "state";
      countEl.textContent = "";
      return;
    }
    stateEl.textContent = "";

    shown.forEach(function (item) {
      var li = document.createElement("li");
      var icon = iconFor(item);

      if (item.type === "dir") {
        li.innerHTML =
          '<span class="folder"><span class="icon">' + icon + '</span>' +
          '<span class="name">' + escapeHtml(item.name) + '</span>' +
          '<span class="meta">폴더</span></span>';
        li.querySelector(".folder").addEventListener("click", function () {
          location.hash = "#/" + item.path;
        });
      } else {
        // GitHub Pages에서 직접 열리는 링크 (html_url 대신 실제 페이지 경로)
        var href = item.path.split("/").map(encodeURIComponent).join("/");
        li.innerHTML =
          '<a href="' + href + '">' +
          '<span class="icon">' + icon + '</span>' +
          '<span class="name">' + escapeHtml(item.name) + '</span>' +
          '<span class="meta">' + humanSize(item.size) + '</span></a>';
      }
      listEl.appendChild(li);
    });

    var files = shown.filter(function (i) { return i.type === "file"; }).length;
    var dirs  = shown.length - files;
    countEl.textContent = "폴더 " + dirs + "개 · 파일 " + files + "개";
  }

  function load() {
    var path = currentPath();
    stateEl.textContent = "불러오는 중…";
    stateEl.className = "state";
    listEl.innerHTML = "";
    countEl.textContent = "";
    renderBreadcrumb(path);

    fetch(apiUrl(path), { headers: { "Accept": "application/vnd.github+json" } })
      .then(function (res) {
        if (!res.ok) {
          if (res.status === 403) {
            throw new Error("GitHub API 요청 한도(비로그인 시간당 60회)를 초과했습니다. 잠시 후 다시 시도하세요.");
          }
          if (res.status === 404) {
            throw new Error("경로 또는 저장소를 찾을 수 없습니다. OWNER/REPO/BRANCH 설정을 확인하세요.");
          }
          throw new Error("요청 실패: HTTP " + res.status);
        }
        return res.json();
      })
      .then(function (data) {
        if (!Array.isArray(data)) {
          throw new Error("폴더가 아닙니다.");
        }
        currentItems = data;
        render(searchEl.value);
      })
      .catch(function (err) {
        currentItems = [];
        stateEl.textContent = "⚠️ " + err.message;
        stateEl.className = "state error";
      });
  }

  searchEl.addEventListener("input", function () {
    render(this.value);
  });

  window.addEventListener("hashchange", function () {
    searchEl.value = "";
    load();
  });

  load();
})();
</script>
</body>
</html>
