<!DOCTYPE html>

    <style>
        body {

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date-info">
            <h1>Idag</h1>
            <p id="year"></p>
            <p id="month"></p>
            <p id="day"></p>
            <p id="weekday"></p>
            <p id="week"></p>
        </div>
        <div class="mayan-clock">
            <h1>MAYA Klockan</h1>
            <div id="mayan-time"></div>

    </div>

    <script>
        const base255Symbols = "то╜таБтаВтаГтаДтаЕтаЖтаЗтаИтаЙтаКтаЛтаМтаНтаОтаПтаРтаСтаТтаУтаФтаХтаЦтаЧтаШтаЩтаЪтаЫтаЬтаЭтаЮтаЯтаатабтавтагтадтаетажтазтаитайтакталтамтантаотапта░та▒та▓та│та┤та╡та╢та╖та╕та╣та║та╗та╝та╜та╛та┐тбАтбБтбВтбГтбДтбЕтбЖтбЗтбИтбЙтбКтбЛтбМтбНтбОтбПтбРтбСтбТтбУтбФтбХтбЦтбЧтбШтбЩтбЪтбЫтбЬтбЭтбЮтбЯтбатббтбвтбгтбдтбетбжтбзтбитбйтбктблтбмтбнтботбптб░тб▒тб▓тб│тб┤тб╡тб╢тб╖тб╕тб╣тб║тб╗тб╝тб╜тб╛тб┐твАтвБтвВтвГтвДтвЕтвЖтвЗтвИтвЙтвКтвЛтвМтвНтвОтвПтвРтвСтвТтвУтвФтвХтвЦтвЧтвШтвЩтвЪтвЫтвЬтвЭтвЮтвЯтватвбтввтвгтвдтветвжтвзтвитвйтвктвлтвмтвнтвотвптв░тв▒тв▓тв│тв┤тв╡тв╢тв╖тв╕тв╣тв║тв╗тв╝тв╜тв╛тв┐тгАтгБтгВтгГтгДтгЕтгЖтгЗтгИтгЙтгКтгЛтгМтгНтгОтгПтгРтгСтгТтгУтгФтгХтгЦтгЧтгШтгЩтгЪтгЫтгЬтгЭтгЮтгЯтгатгбтгвтггтгдтгетгжтгзтгитгйтгктглтгмтгнтготгптг░тг▒тг▓тг│тг┤тг╡тг╢тг╖тг╕тг╣тг║тг╗тг╝тг╜тг╛тг┐";
        const base12Symbols = "тЧМтЩИтЩЙтЩКтЩЛтЩМтЩНтЩОтЩПтЩРтЩСтЩТтЩУ";
        const base10Symbols = "тЧМрежрезреирейрекрелремренреореп";
        const base8Symbols = "тЧМтЪАтЪБтЪВтЪГтЪДтЪЖтЪЗ";
        const base52Symbols = "тЧМтСатСбтСвтСгтСдтСетСжтСзтСитСйтСктСлтСмтСнтСотСптС░тС▒тС▓тС│уЙСуЙТуЙУуЙИуЙЙуЙКуЙЛуЙМуЙНуЙОуЙПуЙЭуЙЮуЙЯуК▒уК▓уК│уК┤уК╡уК╢уК╖уК╕уК╣уК║уК╗уК╝уК╜уК╛уК┐уКАуКБ";
        const vigesimalMap = {
                0: "т╡Ъ", 1: "\u{1D2E1}", 2: "\u{1D2E2}", 3: "\u{1D2E3}", 4: "\u{1D2E4}", 
                5: "\u{1D2E5}", 6: "\u{1D2E6}", 7: "\u{1D2E7}", 8: "\u{1D2E8}", 9: "\u{1D2E9}", 
                10: "\u{1D2EA}", 11: "\u{1D2EB}", 12: "\u{1D2EC}", 13: "\u{1D2ED}", 14: "\u{1D2EE}", 
                15: "\u{1D2EF}", 16: "\u{1D2F0}", 17: "\u{1D2F1}", 18: "\u{1D2F2}", 19: "\u{1D2F3}"
            };

        function convertToBase(num, base, symbols) {
            if (num === 0) return symbols[0];
            let result = '';
            while (num > 0) {
                result = symbols[num % base] + result;
                num = Math.floor(num / base);
            }
            return result || symbols[0];
        }
        function toVigesimal(n) {
            const quotient = Math.floor(n / 20);
            const remainder = n % 20;
            return [vigesimalMap[quotient], vigesimalMap[remainder]];
        }

        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = now.getDay();
            const weekNumber = getWeekNumber(now);
        
            document.getElementById('year').textContent = `ыЕД(b255)[ ${convertToBase(year, 255, base255Symbols)}]`;
            document.getElementById('month').textContent = `ьЫФ(b12)[ ${convertToBase(month, 12, base12Symbols)}]`;
            document.getElementById('day').textContent = `ьЭ╝(b10)[ ${convertToBase(day, 10, base10Symbols)}]`;
            document.getElementById('weekday').textContent = `ьг╝ (b8)[ ${base8Symbols[weekday]}]`;
            document.getElementById('week').textContent = `ьг╝ь░и (b52)[ ${convertToBase(weekNumber, 52, base52Symbols)}]`;
        }

        function updateMayanClock() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();

            const vigHour = toVigesimal(hour);
            const vigMinute = toVigesimal(minute);
            const vigSecond = toVigesimal(second);

            const mayanTime = `${vigHour[0]} тбЗ${vigMinute[0]} тбЗ${vigSecond[0]}<br>${vigHour[1]} тбЗ${vigMinute[1]} тбЗ${vigSecond[1]}`;
            document.getElementById('mayan-time').innerHTML = mayanTime;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateAll() {
            updateDate();
            updateMayanClock();
        }

        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
