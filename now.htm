<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check time now ⚗</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .date-info, .mayan-clock {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        p {
            margin: 10px 0;
            font-size: 18px;
        }
        #mayan-time {
            font-size: 60px;
            text-align: center;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date-info">
            <h1>Today</h1>
            <p id="year"></p>
            <p id="month"></p>
            <p id="day"></p>
            <p id="weekday"></p>
            <p id="week"></p>
        </div>
        <div class="mayan-clock">
            <h1>MAYAN TIMER</h1>
            <div id="mayan-time"></div>
        </div>
    </div>

    <script>
        const base255Symbols = "⮽⠁⠂⠃⠄⠅⠆⠇⠈⠉⠊⠋⠌⠍⠎⠏⠐⠑⠒⠓⠔⠕⠖⠗⠘⠙⠚⠛⠜⠝⠞⠟⠠⠡⠢⠣⠤⠥⠦⠧⠨⠩⠪⠫⠬⠭⠮⠯⠰⠱⠲⠳⠴⠵⠶⠷⠸⠹⠺⠻⠼⠽⠾⠿⡀⡁⡂⡃⡄⡅⡆⡇⡈⡉⡊⡋⡌⡍⡎⡏⡐⡑⡒⡓⡔⡕⡖⡗⡘⡙⡚⡛⡜⡝⡞⡟⡠⡡⡢⡣⡤⡥⡦⡧⡨⡩⡪⡫⡬⡭⡮⡯⡰⡱⡲⡳⡴⡵⡶⡷⡸⡹⡺⡻⡼⡽⡾⡿⢀⢁⢂⢃⢄⢅⢆⢇⢈⢉⢊⢋⢌⢍⢎⢏⢐⢑⢒⢓⢔⢕⢖⢗⢘⢙⢚⢛⢜⢝⢞⢟⢠⢡⢢⢣⢤⢥⢦⢧⢨⢩⢪⢫⢬⢭⢮⢯⢰⢱⢲⢳⢴⢵⢶⢷⢸⢹⢺⢻⢼⢽⢾⢿⣀⣁⣂⣃⣄⣅⣆⣇⣈⣉⣊⣋⣌⣍⣎⣏⣐⣑⣒⣓⣔⣕⣖⣗⣘⣙⣚⣛⣜⣝⣞⣟⣠⣡⣢⣣⣤⣥⣦⣧⣨⣩⣪⣫⣬⣭⣮⣯⣰⣱⣲⣳⣴⣵⣶⣷⣸⣹⣺⣻⣼⣽⣾⣿";
        const base12Symbols = "◌♈♉♊♋♌♍♎♏♐♑♒♓";
        const base10Symbols = "◌०१२३४५६७८९";
        const base8Symbols = "◌⚀⚁⚂⚃⚄⚆⚇";
        const base52Symbols = "◌①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳㉑㉒㉓㉈㉉㉊㉋㉌㉍㉎㉏㉝㉞㉟㊱㊲㊳㊴㊵㊶㊷㊸㊹㊺㊻㊼㊽㊾㊿㊀㊁";

        const vigesimalMap = {
            0: "ⵚ", 1: "𝋡", 2: "𝋢", 3: "𝋣", 4: "𝋤", 5: "𝋥", 6: "𝋦", 7: "𝋧", 8: "𝋨", 9: "𝋩",
            10: "𝋪", 11: "𝋫", 12: "𝋬", 13: "𝋭", 14: "𝋮", 15: "𝋯", 16: "𝋰", 17: "𝋱", 18: "𝋲", 19: "𝋳"
        };

        function convertToBase(num, base, symbols) {
            if (num === 0) return symbols[0];
            let result = '';
            while (num > 0) {
                result = symbols[num % base] + result;
                num = Math.floor(num / base);
            }
            return result || symbols[0];
        }
        function toVigesimal(n) {
            const quotient = Math.floor(n / 20);
            const remainder = n % 20;
            return [vigesimalMap[quotient], vigesimalMap[remainder]];
        }

        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = now.getDay();
            const weekNumber = getWeekNumber(now);
        
            document.getElementById('year').textContent = `𬀡 (b255)[ ${convertToBase(year, 255, base255Symbols)}]`;
            document.getElementById('month').textContent = `𠂇 (b12)[ ${convertToBase(month, 12, base12Symbols)}]`;
            document.getElementById('day').textContent = `𠂉 (b10)[ ${convertToBase(day, 10, base10Symbols)}]`;
            document.getElementById('weekday').textContent = `𠖓 (b8)[ ${base8Symbols[weekday]}]`;
            document.getElementById('week').textContent = `𠖓 (b52)[ ${convertToBase(weekNumber, 52, base52Symbols)}]`;
        }

        function updateMayanClock() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();

            const vigHour = toVigesimal(hour);
            const vigMinute = toVigesimal(minute);
            const vigSecond = toVigesimal(second);

            const mayanTime = `${vigHour[0]} ⡇${vigMinute[0]} ⡇${vigSecond[0]}<br>${vigHour[1]} ⡇${vigMinute[1]} ⡇${vigSecond[1]}`;
            document.getElementById('mayan-time').innerHTML = mayanTime;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateAll() {
            updateDate();
            updateMayanClock();
        }

        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
