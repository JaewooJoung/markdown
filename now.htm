<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>мҳӨлҠҳмқҳ лӮ м§ң м •ліҙ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .date-info {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        p {
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="date-info">
        <h1>мҳӨлҠҳмқҳ лӮ м§ң м •ліҙ</h1>
        <p id="year"></p>
        <p id="month"></p>
        <p id="day"></p>
        <p id="weekday"></p>
        <p id="week"></p>
    </div>

    <script>
        const base255Symbols = "в®Ҫв Ғв Ӯв ғв „в …в Ҷв Үв Ҳв үв Ҡв Ӣв Ңв Қв Һв Ҹв җв ‘в ’в “в ”в •в –в —в ҳв ҷв ҡв ӣв ңв қв һв ҹв  в Ўв ўв Јв Өв Ҙв Ұв §в Ёв ©в Әв «в ¬в ӯв ®в Ҝв °в ұв Ів ів ҙв өв ¶в ·в ёв №в әв »в јв Ҫв ҫв ҝвЎҖвЎҒвЎӮвЎғвЎ„вЎ…вЎҶвЎҮвЎҲвЎүвЎҠвЎӢвЎҢвЎҚвЎҺвЎҸвЎҗвЎ‘вЎ’вЎ“вЎ”вЎ•вЎ–вЎ—вЎҳвЎҷвЎҡвЎӣвЎңвЎқвЎһвЎҹвЎ вЎЎвЎўвЎЈвЎӨвЎҘвЎҰвЎ§вЎЁвЎ©вЎӘвЎ«вЎ¬вЎӯвЎ®вЎҜвЎ°вЎұвЎІвЎівЎҙвЎөвЎ¶вЎ·вЎёвЎ№вЎәвЎ»вЎјвЎҪвЎҫвЎҝвўҖвўҒвўӮвўғвў„вў…вўҶвўҮвўҲвўүвўҠвўӢвўҢвўҚвўҺвўҸвўҗвў‘вў’вў“вў”вў•вў–вў—вўҳвўҷвўҡвўӣвўңвўқвўһвўҹвў вўЎвўўвўЈвўӨвўҘвўҰвў§вўЁвў©вўӘвў«вў¬вўӯвў®вўҜвў°вўұвўІвўівўҙвўөвў¶вў·вўёвў№вўәвў»вўјвўҪвўҫвўҝвЈҖвЈҒвЈӮвЈғвЈ„вЈ…вЈҶвЈҮвЈҲвЈүвЈҠвЈӢвЈҢвЈҚвЈҺвЈҸвЈҗвЈ‘вЈ’вЈ“вЈ”вЈ•вЈ–вЈ—вЈҳвЈҷвЈҡвЈӣвЈңвЈқвЈһвЈҹвЈ вЈЎвЈўвЈЈвЈӨвЈҘвЈҰвЈ§вЈЁвЈ©вЈӘвЈ«вЈ¬вЈӯвЈ®вЈҜвЈ°вЈұвЈІвЈівЈҙвЈөвЈ¶вЈ·вЈёвЈ№вЈәвЈ»вЈјвЈҪвЈҫвЈҝ";
        const base12Symbols = "вҷҲвҷүвҷҠвҷӢвҷҢвҷҚвҷҺвҷҸвҷҗвҷ‘вҷ’вҷ“";
        const base10Symbols = "в—ҢаҘҰаҘ§аҘЁаҘ©аҘӘаҘ«аҘ¬аҘӯаҘ®аҘҜ";
        const base8Symbols = "вҡҖвҡҒвҡӮвҡғвҡ„вҡҶвҡҮ";
        const base52Symbols = "в‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ёв‘©в‘Әв‘«в‘¬в‘ӯв‘®в‘Ҝв‘°в‘ұв‘Ів‘ігү‘гү’гү“гүҲгүүгүҠгүӢгүҢгүҚгүҺгүҸгүқгүһгүҹгҠұгҠІгҠігҠҙгҠөгҠ¶гҠ·гҠёгҠ№гҠәгҠ»гҠјгҠҪгҠҫгҠҝгҠҖгҠҒ";

        function convertToBase(num, base, symbols) {
            if (num === 0) return symbols[0];
            let result = '';
            while (num > 0) {
                result = symbols[num % base] + result;
                num = Math.floor(num / base);
            }
            return result;
        }

        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = now.getDay();
            const weekNumber = getWeekNumber(now);

            document.getElementById('year').textContent = `л…„лҸ„ (255м§„мҲҳ): ${convertToBase(year, 255, base255Symbols)}`;
            document.getElementById('month').textContent = `мӣ” (12м§„мҲҳ): ${convertToBase(month, 12, base12Symbols)}`;
            document.getElementById('day').textContent = `мқј (10м§„мҲҳ): ${convertToBase(day, 10, base10Symbols)}`;
            document.getElementById('weekday').textContent = `мҡ”мқј (8м§„мҲҳ): ${base8Symbols[weekday]}`;
            document.getElementById('week').textContent = `мЈјм°Ё (52м§„мҲҳ): ${convertToBase(weekNumber, 52, base52Symbols)}`;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        updateDate();
        setInterval(updateDate, 1000);
    </script>
</body>
</html>
