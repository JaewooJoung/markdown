<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Math&display=swap" rel="stylesheet">
    <title>Check time now вҡ—</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .date-info, .mayan-clock {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        p {
            margin: 10px 0;
            font-size: 18px;
        }
        #mayan-time {
            font-size: 60px;
            text-align: center;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date-info">
            <h1>Idag</h1>
            <p id="year"></p>
            <p id="month"></p>
            <p id="day"></p>
            <p id="weekday"></p>
            <p id="week"></p>
        </div>
        <div class="mayan-clock">
            <h1>MAYA Klockan</h1>
            <div id="mayan-time"></div>
        </div>
    </div>

    <script>
        const base255Symbols = "в®Ҫв Ғв Ӯв ғв „в …в Ҷв Үв Ҳв үв Ҡв Ӣв Ңв Қв Һв Ҹв җв ‘в ’в “в ”в •в –в —в ҳв ҷв ҡв ӣв ңв қв һв ҹв  в Ўв ўв Јв Өв Ҙв Ұв §в Ёв ©в Әв «в ¬в ӯв ®в Ҝв °в ұв Ів ів ҙв өв ¶в ·в ёв №в әв »в јв Ҫв ҫв ҝвЎҖвЎҒвЎӮвЎғвЎ„вЎ…вЎҶвЎҮвЎҲвЎүвЎҠвЎӢвЎҢвЎҚвЎҺвЎҸвЎҗвЎ‘вЎ’вЎ“вЎ”вЎ•вЎ–вЎ—вЎҳвЎҷвЎҡвЎӣвЎңвЎқвЎһвЎҹвЎ вЎЎвЎўвЎЈвЎӨвЎҘвЎҰвЎ§вЎЁвЎ©вЎӘвЎ«вЎ¬вЎӯвЎ®вЎҜвЎ°вЎұвЎІвЎівЎҙвЎөвЎ¶вЎ·вЎёвЎ№вЎәвЎ»вЎјвЎҪвЎҫвЎҝвўҖвўҒвўӮвўғвў„вў…вўҶвўҮвўҲвўүвўҠвўӢвўҢвўҚвўҺвўҸвўҗвў‘вў’вў“вў”вў•вў–вў—вўҳвўҷвўҡвўӣвўңвўқвўһвўҹвў вўЎвўўвўЈвўӨвўҘвўҰвў§вўЁвў©вўӘвў«вў¬вўӯвў®вўҜвў°вўұвўІвўівўҙвўөвў¶вў·вўёвў№вўәвў»вўјвўҪвўҫвўҝвЈҖвЈҒвЈӮвЈғвЈ„вЈ…вЈҶвЈҮвЈҲвЈүвЈҠвЈӢвЈҢвЈҚвЈҺвЈҸвЈҗвЈ‘вЈ’вЈ“вЈ”вЈ•вЈ–вЈ—вЈҳвЈҷвЈҡвЈӣвЈңвЈқвЈһвЈҹвЈ вЈЎвЈўвЈЈвЈӨвЈҘвЈҰвЈ§вЈЁвЈ©вЈӘвЈ«вЈ¬вЈӯвЈ®вЈҜвЈ°вЈұвЈІвЈівЈҙвЈөвЈ¶вЈ·вЈёвЈ№вЈәвЈ»вЈјвЈҪвЈҫвЈҝ";
        const base12Symbols = "в—ҢвҷҲвҷүвҷҠвҷӢвҷҢвҷҚвҷҺвҷҸвҷҗвҷ‘вҷ’вҷ“";
        const base10Symbols = "в—ҢаҘҰаҘ§аҘЁаҘ©аҘӘаҘ«аҘ¬аҘӯаҘ®аҘҜ";
        const base8Symbols = "в—ҢвҡҖвҡҒвҡӮвҡғвҡ„вҡҶвҡҮ";
        const base52Symbols = "в—Ңв‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ёв‘©в‘Әв‘«в‘¬в‘ӯв‘®в‘Ҝв‘°в‘ұв‘Ів‘ігү‘гү’гү“гүҲгүүгүҠгүӢгүҢгүҚгүҺгүҸгүқгүһгүҹгҠұгҠІгҠігҠҙгҠөгҠ¶гҠ·гҠёгҠ№гҠәгҠ»гҠјгҠҪгҠҫгҠҝгҠҖгҠҒ";

        const vigesimalMap = {
    0: "вөҡ", 1: "\u{1D361}", 2: "\u{1D362}", 3: "\u{1D363}", 4: "\u{1D364}", 5: "\u{1D365}", 
    6: "\u{1D366}", 7: "\u{1D367}", 8: "\u{1D368}", 9: "\u{1D369}", 10: "\u{1D36A}", 
    11: "\u{1D36B}", 12: "\u{1D36C}", 13: "\u{1D36D}", 14: "\u{1D36E}", 15: "\u{1D36F}", 
    16: "\u{1D370}", 17: "\u{1D371}", 18: "\u{1D372}", 19: "\u{1D373}"
};

        function convertToBase(num, base, symbols) {
            if (num === 0) return symbols[0];
            let result = '';
            while (num > 0) {
                result = symbols[num % base] + result;
                num = Math.floor(num / base);
            }
            return result || symbols[0];
        }
        function toVigesimal(n) {
            const quotient = Math.floor(n / 20);
            const remainder = n % 20;
            return [vigesimalMap[quotient], vigesimalMap[remainder]];
        }

        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = now.getDay();
            const weekNumber = getWeekNumber(now);
        
            document.getElementById('year').textContent = `л…„(b255)[ ${convertToBase(year, 255, base255Symbols)}]`;
            document.getElementById('month').textContent = `мӣ”(b12)[ ${convertToBase(month, 12, base12Symbols)}]`;
            document.getElementById('day').textContent = `мқј(b10)[ ${convertToBase(day, 10, base10Symbols)}]`;
            document.getElementById('weekday').textContent = `мЈј (b8)[ ${base8Symbols[weekday]}]`;
            document.getElementById('week').textContent = `мЈјм°Ё (b52)[ ${convertToBase(weekNumber, 52, base52Symbols)}]`;
        }

        function updateMayanClock() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();

            const vigHour = toVigesimal(hour);
            const vigMinute = toVigesimal(minute);
            const vigSecond = toVigesimal(second);

            const mayanTime = `${vigHour[0]} вЎҮ${vigMinute[0]} вЎҮ${vigSecond[0]}<br>${vigHour[1]} вЎҮ${vigMinute[1]} вЎҮ${vigSecond[1]}`;
            document.getElementById('mayan-time').innerHTML = mayanTime;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateAll() {
            updateDate();
            updateMayanClock();
        }

        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
