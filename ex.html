<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 환율 변환기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    padding: 32px;
    width: 100%;
    max-width: 480px;
  }
  h1 {
    color: #1e3c72;
    font-size: 24px;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .status {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-bottom: 24px;
    min-height: 18px;
  }
  .status.error { color: #c0392b; }
  .status.success { color: #27ae60; }
  .currency-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding: 14px 16px;
    background: #f5f7fa;
    border-radius: 12px;
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .currency-row:focus-within {
    background: #fff;
    border-color: #2a5298;
    box-shadow: 0 4px 12px rgba(42,82,152,0.15);
  }
  .flag {
    font-size: 28px;
    width: 36px;
    text-align: center;
  }
  .currency-info {
    flex: 1;
    min-width: 0;
  }
  .currency-code {
    font-weight: 700;
    color: #1e3c72;
    font-size: 14px;
  }
  .currency-name {
    font-size: 11px;
    color: #888;
  }
  input[type="text"] {
    width: 150px;
    padding: 10px 12px;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    text-align: right;
    color: #1e3c72;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    font-variant-numeric: tabular-nums;
  }
  input[type="text"]:focus {
    border-color: #2a5298;
  }
  .refresh-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: #2a5298;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: #1e3c72; }
  .refresh-btn:disabled { background: #999; cursor: not-allowed; }
  @media (max-width: 480px) {
    input[type="text"] { width: 120px; font-size: 15px; }
    .flag { font-size: 24px; width: 30px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>💱 오늘의 환율 변환기</h1>
  <p class="subtitle">아무 칸에나 숫자를 입력하면 자동 변환됩니다</p>
  <div class="status" id="status">환율 불러오는 중...</div>

  <div class="currency-row">
    <div class="flag">🇰🇷</div>
    <div class="currency-info">
      <div class="currency-code">KRW</div>
      <div class="currency-name">한국 원</div>
    </div>
    <input type="text" id="KRW" data-code="KRW" placeholder="0" inputmode="decimal">
  </div>

  <div class="currency-row">
    <div class="flag">🇸🇪</div>
    <div class="currency-info">
      <div class="currency-code">SEK</div>
      <div class="currency-name">스웨덴 크로나</div>
    </div>
    <input type="text" id="SEK" data-code="SEK" placeholder="0.00" inputmode="decimal">
  </div>

  <div class="currency-row">
    <div class="flag">🇺🇸</div>
    <div class="currency-info">
      <div class="currency-code">USD</div>
      <div class="currency-name">미국 달러</div>
    </div>
    <input type="text" id="USD" data-code="USD" placeholder="0.00" inputmode="decimal">
  </div>

  <div class="currency-row">
    <div class="flag">🇨🇳</div>
    <div class="currency-info">
      <div class="currency-code">CNY</div>
      <div class="currency-name">중국 위안</div>
    </div>
    <input type="text" id="CNY" data-code="CNY" placeholder="0.00" inputmode="decimal">
  </div>

  <div class="currency-row">
    <div class="flag">🇪🇺</div>
    <div class="currency-info">
      <div class="currency-code">EUR</div>
      <div class="currency-name">유로</div>
    </div>
    <input type="text" id="EUR" data-code="EUR" placeholder="0.00" inputmode="decimal">
  </div>

  <button class="refresh-btn" id="refreshBtn">🔄 환율 새로고침</button>
</div>

<script>
  const CURRENCIES = ['KRW', 'SEK', 'USD', 'CNY', 'EUR'];
  // 통화별 표시 소수점 자릿수
  const DECIMALS = { KRW: 0, SEK: 2, USD: 2, CNY: 2, EUR: 2 };

  // KRW 기준 (백업용 기본값)
  let rates = {
    KRW: 1,
    SEK: 0.0068,
    USD: 0.00072,
    CNY: 0.0052,
    EUR: 0.00062
  };
  let isUpdating = false;

  const statusEl = document.getElementById('status');
  const refreshBtn = document.getElementById('refreshBtn');

  // 천단위 콤마 + 소수점 포맷
  function formatNumber(value, decimals) {
    if (isNaN(value) || value === null) return '';
    return value.toLocaleString('en-US', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    });
  }

  // 타이핑 중 콤마 자동 삽입 (예: "1234567.8" -> "1,234,567.8")
  function formatWhileTyping(rawStr) {
    if (rawStr === '' || rawStr === '.' || rawStr === '-') return rawStr;

    let isNegative = rawStr.startsWith('-');
    let s = isNegative ? rawStr.slice(1) : rawStr;

    // 숫자/소수점만 남기기
    s = s.replace(/[^\d.]/g, '');

    // 소수점은 1개만
    const firstDot = s.indexOf('.');
    if (firstDot !== -1) {
      s = s.slice(0, firstDot + 1) + s.slice(firstDot + 1).replace(/\./g, '');
    }

    let [intPart, decPart] = s.split('.');
    intPart = intPart || '';

    // 정수부 앞 0 제거
    intPart = intPart.replace(/^0+(?=\d)/, '');
    if (intPart === '') intPart = decPart !== undefined ? '0' : '';

    // 콤마 삽입
    const withCommas = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    let out = withCommas;
    if (decPart !== undefined) out += '.' + decPart;
    if (isNegative) out = '-' + out;

    return out;
  }

  function parseNumber(str) {
    if (!str) return NaN;
    return parseFloat(str.replace(/,/g, ''));
  }

  async function fetchRates() {
    statusEl.textContent = '환율 불러오는 중...';
    statusEl.className = 'status';
    refreshBtn.disabled = true;

    try {
      const response = await fetch('https://open.er-api.com/v6/latest/KRW');
      if (!response.ok) throw new Error('API 응답 오류');
      const data = await response.json();

      if (data.result === 'success') {
        rates.KRW = 1;
        rates.SEK = data.rates.SEK;
        rates.USD = data.rates.USD;
        rates.CNY = data.rates.CNY;
        rates.EUR = data.rates.EUR;

        const date = new Date(data.time_last_update_utc);
        const dateStr = date.toLocaleDateString('ko-KR', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
        statusEl.textContent = `✓ ${dateStr} 환율 적용됨`;
        statusEl.className = 'status success';

        const filled = document.querySelector('input[data-has-value="true"]');
        if (filled) updateAll(filled);
      } else {
        throw new Error('환율 데이터 오류');
      }
    } catch (err) {
      console.error(err);
      statusEl.textContent = '⚠ 환율 가져오기 실패 (기본값 사용 중)';
      statusEl.className = 'status error';
    } finally {
      refreshBtn.disabled = false;
    }
  }

  function updateAll(sourceInput) {
    if (isUpdating) return;
    isUpdating = true;

    const sourceCode = sourceInput.dataset.code;
    const sourceValue = parseNumber(sourceInput.value);

    document.querySelectorAll('input[type="text"]').forEach(i => {
      i.dataset.hasValue = 'false';
    });

    if (isNaN(sourceValue) || sourceInput.value === '' || sourceInput.value === '-') {
      CURRENCIES.forEach(code => {
        if (code !== sourceCode) {
          document.getElementById(code).value = '';
        }
      });
      isUpdating = false;
      return;
    }

    sourceInput.dataset.hasValue = 'true';

    const inKRW = sourceValue / rates[sourceCode];

    CURRENCIES.forEach(code => {
      if (code !== sourceCode) {
        const value = inKRW * rates[code];
        document.getElementById(code).value = formatNumber(value, DECIMALS[code]);
      }
    });

    isUpdating = false;
  }

  // 입력 이벤트
  CURRENCIES.forEach(code => {
    const input = document.getElementById(code);

    input.addEventListener('input', (e) => {
      const oldValue = e.target.value;
      const oldCursor = e.target.selectionStart;

      // 커서 앞의 숫자/소수점 개수
      const digitsBeforeCursor = (oldValue.slice(0, oldCursor).match(/[\d.]/g) || []).length;

      const formatted = formatWhileTyping(oldValue);
      e.target.value = formatted;

      // 커서 위치 복원
      let newCursor = formatted.length;
      let count = 0;
      for (let i = 0; i < formatted.length; i++) {
        if (/[\d.]/.test(formatted[i])) {
          count++;
          if (count === digitsBeforeCursor) {
            newCursor = i + 1;
            break;
          }
        }
      }
      e.target.setSelectionRange(newCursor, newCursor);

      updateAll(input);
    });

    // 포커스 잃을 때 깔끔히 정리
    input.addEventListener('blur', (e) => {
      const val = parseNumber(e.target.value);
      if (!isNaN(val) && e.target.value !== '') {
        e.target.value = formatNumber(val, DECIMALS[code]);
      }
    });
  });

  refreshBtn.addEventListener('click', fetchRates);
  fetchRates();
</script>
</body>
</html>
